<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Geodis Driver Timesheet</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:#f0f2f5;padding:20px;min-height:100vh}
    .card{background:white;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.1);padding:30px;max-width:620px;margin:0 auto}
    .header{background:#003366;color:white;padding:16px 20px;border-radius:8px;margin-bottom:24px;text-align:center}
    .header h1{font-size:18px;font-weight:bold}
    .header p{font-size:12px;opacity:.8;margin-top:4px}
    .section-title{font-size:13px;font-weight:bold;color:#003366;text-transform:uppercase;letter-spacing:.5px;margin:20px 0 10px;border-bottom:2px solid #003366;padding-bottom:4px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
    .row.single{grid-template-columns:1fr}
    .field label{display:block;font-size:12px;font-weight:bold;color:#444;margin-bottom:4px}
    .field select,.field input{width:100%;padding:10px 12px;border:1px solid #ccc;border-radius:6px;font-size:14px;background:white;appearance:none;-webkit-appearance:none}
    .field textarea{width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;font-size:13px;resize:vertical}
    .day-grid{display:grid;grid-template-columns:90px 1fr 1fr;gap:8px;align-items:center;margin-bottom:10px}
    .day-label{font-size:13px;font-weight:bold;color:#333}
    .day-grid label{font-size:11px;color:#666;margin-bottom:2px;display:block}
    button{background:#003366;color:white;padding:14px 24px;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;width:100%;margin-top:20px}
    button:hover:not(:disabled){background:#004d99}
    button:disabled{background:#aaa;cursor:not-allowed}
    .msg{text-align:center;padding:12px;border-radius:6px;margin-top:12px;font-size:14px;font-weight:bold;display:none}
    .msg.success{background:#d4edda;color:#155724;display:block}
    .msg.error{background:#f8d7da;color:#721c24;display:block}
    .note{font-size:11px;color:#888;text-align:center;margin-top:8px}
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>MLAM Shuttle Driver Timesheet</h1>
    <p>Meiborg Inc. / Logisnext / Geodis</p>
  </div>
  <form id="tsForm">
    <div class="section-title">Driver Info</div>
    <div class="row single">
      <div class="field">
        <label>Driver Name &amp; Truck #</label>
        <select name="driverTruck" required>
          <option value="">Select Driver</option>
          <option value="Brandon Hernandez|678">Brandon Hernandez - Truck #678</option>
          <option value="Royce Russey|673">Royce Russey - Truck #673</option>
          <option value="Jaime Cuevas|596">Jaime Cuevas - Truck #596</option>
          <option value="Chris Thomas|598">Chris Thomas - Truck #598</option>
          <option value="Chris Nelson|607">Chris Nelson - Truck #607</option>
          <option value="Antonio Cadena|609">Antonio Cadena - Truck #609</option>
          <option value="Armando Luna|597">Armando Luna - Truck #597</option>
          <option value="Shamia Cottrell|661">Shamia Cottrell - Truck #661</option>
          <option value="Clint Greenhouse|594">Clint Greenhouse - Truck #594</option>
          <option value="Rigio Albarran|635">Rigio Albarran - Truck #635</option>
          <option value="Christopher Gober|592">Christopher Gober - Truck #592</option>
          <option value="Steve Lawrence|574">Steve Lawrence - Truck #574</option>
          <option value="OTHER|">Other / Not Listed</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Week Ending (Saturday)</label>
        <input type="date" name="weekEnding" id="weekEnding" required/>
      </div>
      <div class="field">
        <label>Pay Rate</label>
        <select name="rate" required>
          <option value="76.50" selected>$76.50 / hr</option>
        </select>
      </div>
    </div>
    <div class="section-title">Expenses</div>
    <div class="row">
      <div class="field">
        <label>Fuel ($)</label>
        <select name="fuel">
          <option value="0">$0</option>
          <option value="25">$25</option>
          <option value="50">$50</option>
          <option value="75">$75</option>
          <option value="100">$100</option>
          <option value="125">$125</option>
          <option value="150">$150</option>
          <option value="175">$175</option>
          <option value="200">$200</option>
          <option value="250">$250</option>
          <option value="300">$300</option>
          <option value="350">$350</option>
          <option value="400">$400</option>
          <option value="450">$450</option>
          <option value="500">$500</option>
          <option value="600">$600</option>
          <option value="700">$700</option>
          <option value="800">$800</option>
          <option value="850">$850</option>
          <option value="900">$900</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="field">
        <label>Tolls ($)</label>
        <select name="tolls">
          <option value="0">$0</option>
          <option value="5">$5</option>
          <option value="10">$10</option>
          <option value="15">$15</option>
          <option value="20">$20</option>
          <option value="25">$25</option>
          <option value="30">$30</option>
          <option value="40">$40</option>
          <option value="50">$50</option>
          <option value="other">Other</option>
        </select>
      </div>
    </div>
    <div class="section-title">Daily Hours (Sun - Thu)</div>
    <div id="daysSection"></div>
    <div class="section-title">Notes (optional)</div>
    <div class="row single">
      <div class="field">
        <textarea name="notes" rows="2" placeholder="Exact fuel/toll amounts, corrections, or anything else..."></textarea>
      </div>
    </div>
    <button type="submit" id="submitBtn">Submit Timesheet</button>
    <div class="msg" id="msg"></div>
    <p class="note">Data submits directly to the Geodis billing sheet.</p>
  </form>
</div>
<script>
function buildTimeOptions(sel){
  var o='<option value="">No work</option>';
  for(var h=4;h<=23;h++){
    for(var m=0;m<60;m+=15){
      var hh=h%12||12,ampm=h<12?'AM':'PM',mm=m<10?'0'+m:m;
      var val=(h<10?'0':'')+h+':'+(m<10?'0':'')+m;
      var lbl=hh+':'+mm+' '+ampm;
      o+='<option value="'+val+'"'+(val===sel?' selected':'')+'>'+lbl+'</option>';
    }
  }
  return o;
}
var days=[['Sunday','sun'],['Monday','mon'],['Tuesday','tue'],['Wednesday','wed'],['Thursday','thu']];
var sec=document.getElementById('daysSection');
days.forEach(function(d){
  var div=document.createElement('div');
  div.className='day-grid';
  div.innerHTML='<span class="day-label">'+d[0]+'</span>'+
    '<div class="field"><label>Start</label><select name="'+d[1]+'Start">'+buildTimeOptions('06:00')+'</select></div>'+
    '<div class="field"><label>End</label><select name="'+d[1]+'End">'+buildTimeOptions('14:00')+'</select></div>';
  sec.appendChild(div);
});
var dt=new Date(),dy=dt.getDay(),diff=(6-dy+7)%7||7;
dt.setDate(dt.getDate()+diff);
document.getElementById('weekEnding').value=dt.toISOString().slice(0,10);
document.getElementById('tsForm').addEventListener('submit',async function(e){
  e.preventDefault();
  var btn=document.getElementById('submitBtn'),msg=document.getElementById('msg');
  btn.disabled=true;btn.textContent='Submitting...';
  msg.className='msg';msg.textContent='';
  var fd=new FormData(e.target),data={};
  fd.forEach(function(v,k){data[k]=v;});
  var dt2=(data.driverTruck||'').split('|');
  data.driverName=dt2[0]||'';data.truckNumber=dt2[1]||'';
  delete data.driverTruck;
  data.submittedAt=new Date().toISOString();
  try{
    var res=await fetch('https://dmarcum11.app.n8n.cloud/webhook/meiborg-timesheet',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(data)
    });
    if(res.ok){
      msg.className='msg success';
      msg.textContent='Timesheet submitted! Thank you, '+data.driverName+'.';
      e.target.reset();
    }else throw new Error('Error '+res.status);
  }catch(err){
    msg.className='msg error';
    msg.textContent='Submission failed: '+err.message+'. Please try again.';
  }
  btn.disabled=false;btn.textContent='Submit Timesheet';
});
</script>
</body>
</html>
